<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新人入职SOP管理系统</title>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Vue Router 4 -->
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Dexie.js for IndexedDB -->
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1B2838;
            --accent: #FF6B35;
            --secondary: #4DD8E8;
            --light-bg: #f5f7fa;
            --border: #e0e6ed;
            --text-primary: #333;
            --text-secondary: #666;
            --success: #52c41a;
            --warning: #faad14;
            --danger: #ff4d4f;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--light-bg);
            color: var(--text-primary);
        }

        #app {
            height: 100%;
        }

        /* Layout */
        .layout {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--primary);
            color: white;
            overflow-y: auto;
            padding: 20px 0;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar-user {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin: 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s;
            font-size: 14px;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--accent);
            color: white;
        }

        .sidebar-nav svg {
            width: 18px;
            height: 18px;
            margin-right: 12px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .toggle-sidebar {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: none;
        }

        .toggle-sidebar svg {
            width: 20px;
            height: 20px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: var(--light-bg);
        }

        /* Components */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #e55a2b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #3ac5d5;
        }

        .btn-text {
            background: transparent;
            color: var(--accent);
        }

        .btn-text:hover {
            background: rgba(255, 107, 53, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .table th {
            background: var(--light-bg);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .table tr:hover {
            background: var(--light-bg);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: rgba(82, 196, 26, 0.1);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(250, 173, 20, 0.1);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(255, 77, 79, 0.1);
            color: var(--danger);
        }

        .badge-info {
            background: rgba(77, 216, 232, 0.1);
            color: var(--secondary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin: 10px 0;
        }

        .stat-card-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .modal-footer {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(82, 196, 26, 0.1);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .alert-warning {
            background: rgba(250, 173, 20, 0.1);
            color: var(--warning);
            border-left: 4px solid var(--warning);
        }

        .alert-danger {
            background: rgba(255, 77, 79, 0.1);
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }

        /* Login Page */
        .login-container {
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, #2a3f5f 100%);
        }

        .login-left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--primary);
            text-align: center;
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-btn {
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-size: 14px;
        }

        .role-btn:hover,
        .role-btn.active {
            border-color: var(--accent);
            background: rgba(255, 107, 53, 0.05);
            color: var(--accent);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 60px;
                height: calc(100vh - 60px);
                width: 250px;
                transform: translateX(-100%);
                z-index: 500;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .toggle-sidebar {
                display: block;
            }

            .topbar {
                order: -1;
                position: sticky;
                top: 0;
                z-index: 100;
            }

            .main-content {
                order: 0;
            }

            .content {
                padding: 15px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .role-selector {
                grid-template-columns: 1fr;
            }

            .login-container {
                flex-direction: column;
            }

            .login-left {
                display: none;
            }

            .login-box {
                max-width: 100%;
            }
        }

        /* Utility Classes */
        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        .mt-20 {
            margin-top: 20px;
        }

        .mb-20 {
            margin-bottom: 20px;
        }

        .flex {
            display: flex;
            gap: 10px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .flex-col {
            display: flex;
            flex-direction: column;
        }

        .gap-10 {
            gap: 10px;
        }

        .gap-20 {
            gap: 20px;
        }

        .w-full {
            width: 100%;
        }

        .hidden {
            display: none;
        }

        /* Course Cards */
        .course-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .course-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(255, 107, 53, 0.15);
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .course-num {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .course-status {
            font-size: 12px;
        }

        .course-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .course-progress {
            margin-top: 15px;
        }
    </style>
</head>

            setup() {
                const router = useRouter();
                const filterStatus = ref(null);
                const taskStatusMap = reactive({ ...DEFAULT_TASK_STATUS_MAP });

                const loadTaskStatus = async () => {
                    Object.keys(taskStatusMap).forEach(key => delete taskStatusMap[key]);
                    Object.assign(taskStatusMap, DEFAULT_TASK_STATUS_MAP);

                    const currentUser = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
                    if (!currentUser.id) return;

                    try {
                        const submissions = await db.taskSubmissions.where('userId').equals(currentUser.id).toArray();
                        submissions.forEach(item => {
                            taskStatusMap[item.taskId] = item.status || '已提交';
                        });
                    } catch (err) {
                        console.log('Load task status error:', err);
                    }
                };

                const filteredTasks = computed(() => {
                    return TASKS.filter(task => {
                        if (!filterStatus.value) return true;
                        return getTaskStatus(task.id) === filterStatus.value;
                    });
                });

                const getTaskStatus = (taskId) => {
                    return taskStatusMap[taskId] || '待完成';
                };

                const getTaskStatusClass = (taskId) => {
                    const status = getTaskStatus(taskId);
                    if (status === '已评分') return 'badge-success';
                    if (status === '已提交') return 'badge-warning';
                    return 'badge-info';
                };

                const goTaskDetail = (taskId) => {
                    router.push(`/tasks/${taskId}`);
                };

                onMounted(() => {
                    loadTaskStatus();
                });

                watch(() => router.currentRoute.value.fullPath, () => {
                    loadTaskStatus();
                });

                return {
                    filterStatus,
                    filteredTasks,
                    getTaskStatus,
                    getTaskStatusClass,
                    goTaskDetail
                };
            }
        };

                const taskStatus = ref(DEFAULT_TASK_STATUS_MAP[taskId] || '待完成');

                const loadTaskSubmission = async () => {

                        console.log('Load task submission error:', err);

                    if (taskStatus.value === '已评分') return 'badge-success';

                    return 'badge-info';

                    router.push('/tasks');
                };

                const submitTask = () => {
                    if (!submission.value.trim()) {
                        alert('请输入任务说明');
                        return;
                    }

                    const currentUser = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
                    if (!currentUser.id) {
                        alert('用户信息异常，请重新登录');
                        return;
                    }

                    db.taskSubmissions.put({
                        userId: currentUser.id,
                        taskId,
                        content: submission.value.trim(),
                        status: '已提交',
                        submittedAt: new Date().toISOString()
                    }).then(() => {
                        taskStatus.value = '已提交';
                        alert('任务已提交！等待评分中...');

                        console.log('Submit task error:', err);
                        alert('提交失败，请稍后重试');
                    });
                };

                onMounted(() => {
                    loadTaskSubmission();
                });

                return {
                    task,
                    taskStatus,
                    submission,
                    getTaskStatusClass,
                    goBack,
                    submitTask
                };
            }
        };

                    : to.path;

            const roleGuardMap = {
                '/exam': ['admin', 'trainee'],
                '/mentor': ['admin', 'mentor'],
                '/evaluation': ['admin', 'mentor'],
                '/analytics': ['admin']
            };

            const allowedRoles = roleGuardMap[normalizedPath];
            if (to.meta.requiresAuth && !isAuthenticated) {
                next('/');

                next('/dashboard');
            } else if (allowedRoles && !allowedRoles.includes(role)) {
                next('/dashboard');
