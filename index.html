<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新人入职SOP管理系统</title>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Vue Router 4 -->
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest"></script>
    <script src="./runtime-config.js"></script>
    <script src="./app-config.js"></script>
    <script src="./app-services.js"></script>
    <script src="./app-default-data.js"></script>
    <script src="./app-fallback-data.js"></script>
    <script src="./app-ops-views.js"></script>
    <script src="./app-support-views.js"></script>
    <script src="./app-review-views.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1B2838;
            --accent: #FF6B35;
            --secondary: #4DD8E8;
            --light-bg: #f5f7fa;
            --border: #e0e6ed;
            --text-primary: #333;
            --text-secondary: #666;
            --success: #52c41a;
            --warning: #faad14;
            --danger: #ff4d4f;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--light-bg);
            color: var(--text-primary);
        }

        #app {
            height: 100%;
        }

        .app-loading {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top, rgba(77, 216, 232, 0.18), transparent 35%),
                linear-gradient(135deg, #f5f7fa 0%, #eef3f8 100%);
            padding: 24px;
        }

        .app-loading-card {
            width: min(420px, 100%);
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(27, 40, 56, 0.08);
            border-radius: 20px;
            box-shadow: 0 18px 50px rgba(27, 40, 56, 0.12);
            padding: 32px 28px;
            text-align: center;
        }

        .app-loading-spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 18px;
            border-radius: 50%;
            border: 3px solid rgba(255, 107, 53, 0.18);
            border-top-color: var(--accent);
            animation: app-spin 0.9s linear infinite;
        }

        @keyframes app-spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Layout */
        .layout {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--primary);
            color: white;
            overflow-y: auto;
            padding: 20px 0;
            transition: transform 0.3s;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar-user {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin: 0;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s;
            font-size: 14px;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--accent);
            color: white;
        }

        .sidebar-nav svg {
            width: 18px;
            height: 18px;
            margin-right: 12px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .toggle-sidebar {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: none;
        }

        .toggle-sidebar svg {
            width: 20px;
            height: 20px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: var(--light-bg);
        }

        /* Components */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #e55a2b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #3ac5d5;
        }

        .btn-text {
            background: transparent;
            color: var(--accent);
        }

        .btn-text:hover {
            background: rgba(255, 107, 53, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .table th {
            background: var(--light-bg);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .table tr:hover {
            background: var(--light-bg);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: rgba(82, 196, 26, 0.1);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(250, 173, 20, 0.1);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(255, 77, 79, 0.1);
            color: var(--danger);
        }

        .badge-info {
            background: rgba(77, 216, 232, 0.1);
            color: var(--secondary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            margin: 10px 0;
        }

        .stat-card-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .modal-footer {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(82, 196, 26, 0.1);
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .alert-warning {
            background: rgba(250, 173, 20, 0.1);
            color: var(--warning);
            border-left: 4px solid var(--warning);
        }

        .alert-danger {
            background: rgba(255, 77, 79, 0.1);
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }

        /* Login Page */
        .login-container {
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, #2a3f5f 100%);
        }

        .login-left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--primary);
            text-align: center;
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-btn {
            padding: 20px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-size: 14px;
        }

        .role-btn:hover,
        .role-btn.active {
            border-color: var(--accent);
            background: rgba(255, 107, 53, 0.05);
            color: var(--accent);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 60px;
                height: calc(100vh - 60px);
                width: 250px;
                transform: translateX(-100%);
                z-index: 500;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .toggle-sidebar {
                display: block;
            }

            .topbar {
                order: -1;
                position: sticky;
                top: 0;
                z-index: 100;
            }

            .main-content {
                order: 0;
            }

            .content {
                padding: 15px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .role-selector {
                grid-template-columns: 1fr;
            }

            .login-container {
                flex-direction: column;
            }

            .login-left {
                display: none;
            }

            .login-box {
                max-width: 100%;
            }
        }

        /* Utility Classes */
        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        .mt-20 {
            margin-top: 20px;
        }

        .mb-20 {
            margin-bottom: 20px;
        }

        .flex {
            display: flex;
            gap: 10px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .flex-col {
            display: flex;
            flex-direction: column;
        }

        .gap-10 {
            gap: 10px;
        }

        .gap-20 {
            gap: 20px;
        }

        .w-full {
            width: 100%;
        }

        .hidden {
            display: none;
        }

        /* Course Cards */
        .course-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .course-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(255, 107, 53, 0.15);
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .course-num {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .course-status {
            font-size: 12px;
        }

        .course-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .course-progress {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const { createApp, ref, reactive, computed, watch, onMounted, onUnmounted } = Vue;
        const { createRouter, createWebHashHistory, useRouter, useRoute } = VueRouter;
        const { createSupabaseClient, isSupabaseReady, AuthService, DatabaseService } = window.AppServices;

        // ===== SUPABASE 配置 =====
        // 请在 app-config.js 中填入你自己的 Supabase 项目信息
        const supabase = createSupabaseClient(window.APP_CONFIG, window.supabase);

        // ===== Auth State Management =====
        const currentUser = ref(null);
        const userProfile = ref(null);
        const authInitialized = ref(false);
        let authInitPromise = null;
        const isSupabaseConfigured = computed(() => isSupabaseReady(window.APP_CONFIG));

        const COURSE_PROGRESS_PERCENT = {
            not_started: 0,
            in_progress: 50,
            completed: 100
        };

        const TASK_STATUS_LABELS = {
            pending: '待完成',
            submitted: '已提交',
            scored: '已评分'
        };

        function toDateInputValue(value) {
            if (!value) return '-';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? '-' : date.toISOString().slice(0, 10);
        }

        function getCourseProgressPercent(status) {
            return COURSE_PROGRESS_PERCENT[status] ?? 0;
        }

        function mapTaskStatus(status) {
            return TASK_STATUS_LABELS[status] || '待完成';
        }

        function mapEvaluationStatus(status) {
            const labels = {
                pending: '待提交',
                mentor_reviewed: '带教已评',
                admin_reviewed: '管理员已审',
                completed: '已完成'
            };
            return labels[status] || '处理中';
        }

        function getDaysToConfirm(joinDate) {
            if (!joinDate) return 30;
            const baseDate = new Date(joinDate);
            if (Number.isNaN(baseDate.getTime())) return 30;

            const targetDate = new Date(baseDate);
            targetDate.setDate(targetDate.getDate() + 30);
            return Math.max(Math.ceil((targetDate.getTime() - Date.now()) / (1000 * 60 * 60 * 24)), 0);
        }

        function getLastNDates(count) {
            return Array.from({ length: count }, (_, index) => {
                const date = new Date();
                date.setHours(0, 0, 0, 0);
                date.setDate(date.getDate() - (count - index - 1));
                return date;
            });
        }

        function formatShortDateLabel(date) {
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }

        function buildDailyCounts(dates, events) {
            return dates.map((date) => {
                const start = new Date(date);
                const end = new Date(date);
                end.setDate(end.getDate() + 1);

                return events.filter((value) => {
                    if (!value) return false;
                    const eventDate = new Date(value);
                    return !Number.isNaN(eventDate.getTime()) && eventDate >= start && eventDate < end;
                }).length;
            });
        }

        async function syncUserProfile(authUser) {
            if (!authUser || !isSupabaseConfigured.value) {
                userProfile.value = null;
                return;
            }

            try {
                userProfile.value = await AuthService.fetchProfile(supabase, authUser.id);
            } catch (error) {
                console.error('User profile sync error:', error);
                userProfile.value = null;
            }
        }

        // 初始化认证
        async function initAuth() {
            if (authInitPromise) {
                return authInitPromise;
            }

            authInitPromise = (async () => {
                if (!isSupabaseConfigured.value) {
                    authInitialized.value = true;
                    currentUser.value = null;
                    userProfile.value = null;
                    return;
                }
                try {
                    const session = await AuthService.getSession(supabase);
                    if (session) {
                        currentUser.value = session.user;
                        await syncUserProfile(session.user);
                    }
                } catch (error) {
                    console.error('Auth initialization error:', error);
                } finally {
                    authInitialized.value = true;
                }
            })();

            try {
                await authInitPromise;
            } finally {
                authInitPromise = null;
            }
        }

        // 监听认证状态变化
        AuthService.onAuthStateChange(supabase, async (event, session) => {
            if (session) {
                currentUser.value = session.user;
                await syncUserProfile(session.user);
            } else {
                currentUser.value = null;
                userProfile.value = null;
            }
            authInitialized.value = true;
        });

        // ==================== Initial Data ====================
        const { courses: DEFAULT_COURSES, exams: DEFAULT_EXAMS, tasks: DEFAULT_TASKS } = window.AppDefaultData;
        const {
            resources: FALLBACK_RESOURCES,
            workflows: FALLBACK_WORKFLOWS,
            coursewares: FALLBACK_COURSEWARES,
            archives: FALLBACK_ARCHIVES,
            pilots: FALLBACK_PILOTS
        } = window.AppFallbackData;

        const catalogState = reactive({
            courses: DEFAULT_COURSES,
            exams: DEFAULT_EXAMS,
            tasks: DEFAULT_TASKS,
            source: 'local'
        });

        async function loadCatalogData() {
            if (!isSupabaseConfigured.value) {
                catalogState.courses = DEFAULT_COURSES;
                catalogState.exams = DEFAULT_EXAMS;
                catalogState.tasks = DEFAULT_TASKS;
                catalogState.source = 'local';
                return;
            }

            try {
                const [courseRows, taskRows, examRows] = await Promise.all([
                    DatabaseService.list(supabase, 'course_catalog', {
                        select: 'id, title, description, topics, sort_order',
                        filters: [{ type: 'order', column: 'sort_order', ascending: true }]
                    }),
                    DatabaseService.list(supabase, 'task_catalog', {
                        select: 'id, course_id, title, description, points, sort_order',
                        filters: [{ type: 'order', column: 'sort_order', ascending: true }]
                    }),
                    DatabaseService.list(supabase, 'exam_question_bank', {
                        select: 'role_name, question_order, question, options, correct_index',
                        filters: [
                            { type: 'order', column: 'role_name', ascending: true },
                            { type: 'order', column: 'question_order', ascending: true }
                        ]
                    })
                ]);

                if (!courseRows.length || !taskRows.length || !examRows.length) {
                    throw new Error('Catalog tables are empty.');
                }

                catalogState.courses = courseRows.map((row) => ({
                    id: row.id,
                    title: row.title,
                    description: row.description,
                    topics: Array.isArray(row.topics) ? row.topics : []
                }));

                catalogState.tasks = taskRows.map((row) => ({
                    id: row.id,
                    courseId: row.course_id,
                    title: row.title,
                    description: row.description,
                    points: row.points
                }));

                catalogState.exams = examRows.reduce((acc, row, index) => {
                    if (!acc[row.role_name]) {
                        acc[row.role_name] = [];
                    }

                    acc[row.role_name].push({
                        id: row.question_order || index + 1,
                        question: row.question,
                        options: Array.isArray(row.options) ? row.options : [],
                        correct: row.correct_index
                    });
                    return acc;
                }, {});

                catalogState.source = 'supabase';
            } catch (error) {
                console.warn('Catalog load fallback:', error.message || error);
                catalogState.courses = DEFAULT_COURSES;
                catalogState.exams = DEFAULT_EXAMS;
                catalogState.tasks = DEFAULT_TASKS;
                catalogState.source = 'local';
            }
        }

        watch(
            () => isSupabaseConfigured.value,
            () => {
                loadCatalogData();
            },
            { immediate: true }
        );

        // ==================== Login Component ====================
        const LoginView = {
            template: `
                <div class="login-container">
                    <div class="login-left">
                        <div>
                            <h1 style="font-size: 48px; margin-bottom: 20px;">SOP管理系统</h1>
                            <p style="font-size: 18px; opacity: 0.9;">全流程数字化管理新人入职</p>
                        </div>
                    </div>
                    <div class="login-right">
                        <!-- Supabase 配置检查提示 -->
                        <div v-if="!isSupabaseConfigured" style="background: #fff7e6; border: 1px solid #ffc069; border-radius: 8px; padding: 15px; margin-bottom: 20px; color: #ad6800;">
                            <strong>⚠️ Supabase 未配置</strong><br>
                            请在 app-config.js 中填入你的 Supabase 项目信息
                        </div>

                        <div class="login-box">
                            <div class="login-title">{{ showRegister ? '注 册' : '登 录' }}</div>

                            <!-- Login Form -->
                            <div v-if="!showRegister">

                };
                const updateGoLiveReadiness = async () => {
                    const countSuspiciousRows = (rows, fields) => {
                        if (!Array.isArray(rows) || !Array.isArray(fields)) return 0;
                        return rows.filter((item) => fields.some((field) => {
                            const text = typeof item[field] === 'string' ? item[field].trim() : '';
                            if (!text) return false;
                            return text.includes('仓库装箱单') || /^[{}]+$/.test(text);
                        })).length;
                    };
                    if (!isSupabaseConfigured.value) {
                        goLiveReadiness.suspiciousCount = 0;
                        goLiveReadiness.suspiciousModule = '';
                        goLiveReadiness.items = [
                            { label: 'Supabase 配置', detail: `当前配置来源：${configSourcesText.value}。仍是占位值，需先填入真实项目地址和匿名密钥。`, ok: false },
                            { label: '目录数据', detail: `当前目录来源：${catalogState.source === 'supabase' ? 'Supabase' : '本地兜底'}。`, ok: catalogState.source === 'supabase' },
                            { label: '业务留痕', detail: '未连接数据库前，通知与审批留痕无法形成真实试运行记录。', ok: false }
                        ];
                        goLiveReadiness.ready = false;
                        return;
                    }

                    try {
                        const [userCount, coursewareCount, approvalCount, notificationCount, workflowRows, coursewareRows, archiveRows, pilotRows] = await Promise.all([
                            DatabaseService.count(supabase, 'users'),
                            DatabaseService.count(supabase, 'courseware_library'),
                            DatabaseService.count(supabase, 'approval_logs'),
                            DatabaseService.count(supabase, 'notifications'),
                            DatabaseService.list(supabase, 'talent_workflow_cases', { select: 'candidate_name' }),
                            DatabaseService.list(supabase, 'courseware_library', { select: 'title' }),
                            DatabaseService.list(supabase, 'archive_records', { select: 'title' }),
                            DatabaseService.list(supabase, 'pilot_runs', { select: 'name' })
                        ]);
                        const suspiciousModules = [
                            { label: '人才流程', value: countSuspiciousRows(workflowRows, ['candidate_name']) },
                            { label: '课件版本库', value: countSuspiciousRows(coursewareRows, ['title']) },
                            { label: '历史归档中心', value: countSuspiciousRows(archiveRows, ['title']) },
                            { label: '试运行台账', value: countSuspiciousRows(pilotRows, ['name']) }
                        ];
                        const priorityModule = suspiciousModules.find((item) => item.value > 0);
                        goLiveReadiness.suspiciousCount = suspiciousModules.reduce((total, item) => total + item.value, 0);
                        goLiveReadiness.suspiciousModule = priorityModule?.label || '';
                        goLiveReadiness.items = [
                            { label: 'Supabase 配置', detail: `前端已连接真实 Supabase，当前配置来源：${configSourcesText.value}。`, ok: true },
                            { label: '目录数据', detail: `当前目录来源：${catalogState.source === 'supabase' ? 'Supabase' : '本地兜底'}。建议正式上线前切到数据库目录。`, ok: catalogState.source === 'supabase' },
                            { label: '基础账号与业务数据', detail: `当前已有 ${userCount} 个用户，${coursewareCount} 条课件版本记录。`, ok: userCount > 0 && coursewareCount > 0 },
                            { label: '通知与审批留痕', detail: `当前累计 ${notificationCount} 条通知，${approvalCount} 条审批日志。`, ok: notificationCount > 0 && approvalCount > 0 },
                            { label: '异常内容风险', detail: goLiveReadiness.suspiciousCount > 0 ? `检测到 ${goLiveReadiness.suspiciousCount} 条可疑展示记录，建议优先检查 ${goLiveReadiness.suspiciousModule || '系统诊断'}。` : '当前未发现明显的脏数据展示风险。', ok: goLiveReadiness.suspiciousCount === 0 }
                        ];
                        goLiveReadiness.ready = goLiveReadiness.items.every((item) => item.ok);
                    } catch (error) {
                        console.error('Go-live readiness load error:', error);
                        goLiveReadiness.suspiciousCount = 0;
                        goLiveReadiness.suspiciousModule = '';
                        goLiveReadiness.items = [
                            { label: '数据就绪检查', detail: '读取上线准备数据失败，请检查 Supabase 表结构和权限策略。', ok: false }

                    const approvalRows = await DatabaseService.list(supabase, 'approval_logs', {

                    const weekStart = new Date();

                    stats.weeklyCheckDone = await DatabaseService.count(supabase, 'mentor_logs', {

                    mentorTrainees.value = trainees.map((trainee) => ({

                        name: trainee.name,
                        roleLevel: trainee.role_level || '-',
                        courseProgress: progressRows.filter((row) =>

                        ).length,
                        examScore: examRows.find((row) => row.user_id === trainee.id)?.score || null
                    }));

                    if (userProfile.value?.id) {

                            select: 'id, type, title, content, read, created_at',

                                { type: 'order', column: 'created_at', ascending: false },

                        recentNotifications.value = notices.map((item) => ({

                            route: item.type === 'approval' ? '/evaluation' : item.type === 'workflow' ? '/workflow' : item.type === 'mentor' ? '/mentor' : item.type === 'kpi' ? '/kpi' : '',
                            typeLabel: notificationTypeLabels[item.type] || '系统通知',
                            actionHint: getNotificationActionHint(item.type)
                        }));
                    }
                };

                const loadTraineeDashboard = async () => {
                    const progressRows = await DatabaseService.list(supabase, 'course_progress', {
                        select: 'course_id, status',
                        filters: [{ type: 'eq', column: 'user_id', value: userProfile.value.id }]
                    });

                    const examRows = await DatabaseService.list(supabase, 'exam_records', {
                        select: 'score, created_at',

                            { type: 'eq', column: 'user_id', value: userProfile.value.id },
                            { type: 'order', column: 'created_at', ascending: false },
                            { type: 'limit', column: 'created_at', value: 1 }
                        ]
                    });
                    stats.myExamScore = examRows[0]?.score || 0;
                    stats.daysToConfirm = getDaysToConfirm(userProfile.value.join_date);

                    const submissions = await DatabaseService.list(supabase, 'task_submissions', {
                        select: 'task_id, status',
                        filters: [{ type: 'eq', column: 'user_id', value: userProfile.value.id }]
                    });
                    const submittedTaskMap = new Map(submissions.map((item) => [item.task_id, item.status]));
                    nextTask.value = catalogState.tasks.find((task) => {
                        const status = submittedTaskMap.get(task.id);
                        return !status || status === 'pending';
                    }) || null;

                    const notices = await DatabaseService.list(supabase, 'notifications', {
                        select: 'id, type, title, content, read, created_at',
                        filters: [
                            { type: 'eq', column: 'user_id', value: userProfile.value.id },
                            { type: 'order', column: 'created_at', ascending: false },
                            { type: 'limit', column: 'created_at', value: 3 }
                        ]
                    });
                    recentNotifications.value = notices.map((item) => ({
                        ...item,
                        created_at: toDateInputValue(item.created_at),
                        route: item.type === 'approval' ? '/evaluation' : item.type === 'workflow' ? '/workflow' : item.type === 'mentor' ? '/mentor' : item.type === 'kpi' ? '/kpi' : '',
                        typeLabel: notificationTypeLabels[item.type] || '系统通知',
                        actionHint: getNotificationActionHint(item.type)
                    }));

            template: `

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            setup() {
                const router = useRouter();
                const isAdmin = computed(() => {
                    return userProfile.value?.role === 'admin';
                });
                const userRole = computed(() => userProfile.value?.role || 'trainee');

                const courses = computed(() => catalogState.courses);
                const showAddCourseModal = ref(false);
                const courseProgressMap = reactive({});

                const loadCourseProgress = async () => {
                    Object.keys(courseProgressMap).forEach((key) => {
                        delete courseProgressMap[key];
                    });

                    if (!isSupabaseConfigured.value || !userProfile.value) {
                        courses.value.forEach((course, index) => {
                            courseProgressMap[course.id] = [0, 30, 60, 100, 0, 15, 45][index];
                        });
                        return;
                    }

                    try {
                        if (userRole.value === 'trainee') {
                            const rows = await DatabaseService.list(supabase, 'course_progress', {
                                select: 'course_id, status',
                                filters: [{ type: 'eq', column: 'user_id', value: userProfile.value.id }]
                            });
                            rows.forEach((row) => {
                                courseProgressMap[row.course_id] = getCourseProgressPercent(row.status);
                            });
                            return;
                        }

                        let targetUserIds = [];
                        if (userRole.value === 'admin') {
                            const trainees = await DatabaseService.list(supabase, 'users', {
                                select: 'id',
                                filters: [{ type: 'eq', column: 'role', value: 'trainee' }]
                            });
                            targetUserIds = trainees.map((row) => row.id);
                        } else if (userRole.value === 'mentor') {
                            const trainees = await DatabaseService.list(supabase, 'users', {
                                select: 'id',
                                filters: [{ type: 'eq', column: 'mentor_id', value: userProfile.value.id }]
                            });
                            targetUserIds = trainees.map((row) => row.id);
                        }

                        if (!targetUserIds.length) {
                            return;
                        }

                        const rows = await DatabaseService.list(supabase, 'course_progress', {
                            select: 'course_id, status',
                            filters: [{ type: 'in', column: 'user_id', value: targetUserIds }]
                        });

                        courses.value.forEach((course) => {
                            const courseRows = rows.filter((row) => row.course_id === course.id);
                            if (!courseRows.length) {
                                courseProgressMap[course.id] = 0;
                                return;
                            }

                            const total = courseRows.reduce((sum, row) => sum + getCourseProgressPercent(row.status), 0);
                            courseProgressMap[course.id] = Math.round(total / courseRows.length);
                        });
                    } catch (error) {
                        console.error('Course progress load error:', error);
                    }
                };

                const getCourseProgress = (courseId) => {
                    return courseProgressMap[courseId] || 0;
                };

                const getCourseStatus = (courseId) => {
                    const progress = getCourseProgress(courseId);
                    if (progress === 0) return '未开始';
                    if (progress === 100) return '已完成';
                    return '学习中';
                };

                const getCourseStatusClass = (courseId) => {
                    const status = getCourseStatus(courseId);
                    if (status === '已完成') return 'badge-success';
                    if (status === '学习中') return 'badge-warning';
                    return 'badge-info';
                };

                const goCourseDetail = (courseId) => {
                    router.push(`/courses/${courseId}`);
                };

                watch(
                    () => [isSupabaseConfigured.value, userProfile.value?.id, userRole.value],
                    loadCourseProgress,
                    { immediate: true }
                );

                return {
                    courses,
                    isAdmin,
                    showAddCourseModal,
                    getCourseProgress,
                    getCourseStatus,
                    getCourseStatusClass,
                    goCourseDetail
                };
            }
        };

                                <div class="card-title">任务信息</div>
                                <div style="padding: 20px;">
                                    <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
                                        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 5px;">所属课程</div>
                                        <div style="font-weight: 600;">第{{ task.courseId }}课</div>
                                    </div>
                                    <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
                                        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 5px;">获得积分</div>
                                        <div style="font-weight: 600; color: var(--accent);">{{ task.points }}分</div>
                                    </div>
                                    <div style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
                                        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 5px;">状态</div>
                                        <span class="badge" :class="getTaskStatusClass()">{{ taskStatus }}</span>
                                    </div>
                                    <div>
                                        <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 5px;">提交截止</div>
                                        <div style="font-weight: 600;">2024-02-15</div>
                                    </div>
                                </div>
                            </div>

                            <div v-if="canSubmit && taskStatus !== '已评分'" class="card">
                                <div class="card-title">我的提交</div>
                                <div style="padding: 20px;">
                                    <textarea
                                        v-model="submission"
                                        class="form-textarea"
                                        :disabled="taskStatus === '已提交'"
                                        placeholder="请输入您的任务完成说明..."></textarea>
                                    <button
                                        @click="submitTask"
                                        class="btn btn-primary w-full mt-20"
                                        :disabled="taskStatus === '已提交'">
                                        {{ taskStatus === '已提交' ? '已提交' : '提交任务' }}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            setup() {
                const router = useRouter();
                const route = useRoute();
                const taskId = parseInt(route.params.id);
                const task = computed(() => catalogState.tasks.find(t => t.id === taskId) || {
                    id: taskId,
                    courseId: 0,
                    title: '任务加载中',
                    description: '',
                    points: 0
                });
                const submission = ref('');
                const score = ref(null);
                const scorerName = ref('');
                const scoreTime = ref('');
                const taskStatus = ref('待完成');
                const canSubmit = computed(() => userProfile.value?.role === 'trainee');

                const loadTaskDetail = async () => {
                    submission.value = '';
                    score.value = null;
                    scorerName.value = '';
                    scoreTime.value = '';
                    taskStatus.value = '待完成';

                    if (!isSupabaseConfigured.value || !userProfile.value || userProfile.value.role !== 'trainee') {
                        return;
                    }

                    try {
                        const rows = await DatabaseService.list(supabase, 'task_submissions', {
                            select: 'content, status, score, scorer_name, score_time',
                            filters: [
                                { type: 'eq', column: 'user_id', value: userProfile.value.id },
                                { type: 'eq', column: 'task_id', value: taskId },
                                { type: 'limit', column: 'task_id', value: 1 }
                            ]
                        });
                        const row = rows[0];
                        if (!row) return;

                        submission.value = row.content || '';
                        taskStatus.value = mapTaskStatus(row.status);
                        score.value = row.score;
                        scorerName.value = row.scorer_name || '';
                        scoreTime.value = toDateInputValue(row.score_time);
                    } catch (error) {
                        console.error('Task detail load error:', error);
                    }
                };

                const getTaskStatusClass = () => {
                    if (taskStatus.value === '已评分') return 'badge-success';
                    if (taskStatus.value === '已提交') return 'badge-warning';
                    return 'badge-info';
                };

                const goBack = () => {
                    router.push('/tasks');
                };

                const submitTask = async () => {
                    if (!submission.value.trim()) {
                        alert('请输入任务说明');
                        return;
                    }

                    if (!isSupabaseConfigured.value || !userProfile.value || userProfile.value.role !== 'trainee') {
                        taskStatus.value = '已提交';
                        alert('任务已提交！等待评分中...');
                        return;
                    }

                    try {
                        await DatabaseService.upsert(supabase, 'task_submissions', [{
                            user_id: userProfile.value.id,
                            course_id: task.value.courseId,
                            task_id: task.value.id,
                            content: submission.value.trim(),
                            status: 'submitted',
                            submit_time: new Date().toISOString()
                        }], {
                            upsertOptions: { onConflict: 'user_id,task_id' }
                        });

                        taskStatus.value = '已提交';
                        alert('任务已提交！等待评分中...');
                    } catch (error) {
                        console.error('Task submit error:', error);
                        alert('提交失败，请稍后重试');
                    }
                };

                watch(
                    () => [isSupabaseConfigured.value, userProfile.value?.id, route.params.id],
                    loadTaskDetail,
                    { immediate: true }
                );

                return {
                    task,
                    taskStatus,
                    submission,
                    score,
                    scorerName,
                    scoreTime,
                    canSubmit,
                    getTaskStatusClass,
                    goBack,
                    submitTask
                };
            }
        };

        const MentorView = window.AppReviewViews.createMentorView({
            ref,
            reactive,
            watch,
            userProfile,
            isSupabaseConfigured,
            DatabaseService,
            supabase,
            toDateInputValue
        });

        const KPIView = window.AppReviewViews.createKPIView({
            ref,
            computed,
            watch,
            userProfile,
            isSupabaseConfigured,
            DatabaseService,
            supabase
        });

        const EvaluationView = window.AppReviewViews.createEvaluationView({
            ref,
            reactive,
            watch,
            userProfile,
            isSupabaseConfigured,
            DatabaseService,
            supabase,
            toDateInputValue,
            mapEvaluationStatus,
            catalogState
        });

        const ResourcesView = window.AppSupportViews.createResourcesView({
            ref,
            computed,
            fallbackResources: FALLBACK_RESOURCES
        });

        const AnalyticsView = window.AppSupportViews.createAnalyticsView({
            ref,
            reactive,
            watch,
            onUnmounted,
            catalogState,
            isSupabaseConfigured,
            DatabaseService,
            supabase,
            toDateInputValue,
            Chart
        });

        const NotificationsView = window.AppSupportViews.createNotificationsView({
            ref,
            computed,
            watch,
            onMounted,
            onUnmounted,
            useRouter,
            userProfile,
            isSupabaseConfigured,
            DatabaseService,
            supabase,
            toDateInputValue
        });

        const ApprovalCenterView = window.AppSupportViews.createApprovalCenterView({
            ref,
            computed,
            watch,
            onMounted,
            onUnmounted,
            useRouter,
            userProfile,
            isSupabaseConfigured,
            DatabaseService,
            supabase,
            toDateInputValue
        });

        const SystemHealthView = window.AppSupportViews.createSystemHealthView({
            ref,
            reactive,
            computed,
            watch,
            onMounted,
            onUnmounted,
            useRouter,
            catalogState,
            userProfile,
            isSupabaseConfigured,
            DatabaseService,
            supabase
        });

        const TalentWorkflowView = window.AppOperationalViews.createTalentWorkflowView({
            ref,
            reactive,
            computed,
            watch,
            useRoute,
            useRouter,
            userProfile,
            isSupabaseConfigured,
            DatabaseService,
            supabase,
            fallbackWorkflows: FALLBACK_WORKFLOWS
        });

        const CoursewareView = window.AppOperationalViews.createCoursewareView({
            ref,
            reactive,
            computed,
            watch,
            useRoute,
            useRouter,
            userProfile,
            isSupabaseConfigured,
            DatabaseService,
            supabase,
            fallbackCoursewares: FALLBACK_COURSEWARES,
            toDateInputValue
        });

        const ArchiveView = window.AppOperationalViews.createArchiveView({
            ref,
            computed,
            watch,
            useRoute,
            useRouter,
            isSupabaseConfigured,
            DatabaseService,
            supabase,
            fallbackArchives: FALLBACK_ARCHIVES,
            toDateInputValue
        });

        const PilotRunView = window.AppOperationalViews.createPilotRunView({
            ref,
            reactive,
            computed,
            watch,
            useRoute,
            useRouter,
            userProfile,
            isSupabaseConfigured,
            DatabaseService,
            supabase,
            fallbackPilots: FALLBACK_PILOTS
        });

        // ==================== Layout Component ====================
        const AppLayout = {
            template: `
                <div class="layout">
                    <div class="sidebar" :class="{ open: sidebarOpen }">
                        <div class="sidebar-header">
                            <div class="sidebar-title">SOP管理系统</div>
                            <div class="sidebar-user">{{ currentUserName }}</div>
                        </div>
                        <nav class="sidebar-nav">
                            <li v-for="route in visibleRoutes" :key="route.path">
                                <router-link :to="route.path" class="sidebar-link" @click="sidebarOpen = false">
                                    {{ route.label }}
                                </router-link>
                            </li>
                            <li style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                                <a href="#" class="sidebar-link" @click.prevent="handleLogout" style="color: rgba(255, 255, 255, 0.6);">
                                    登出
                                </a>
                            </li>
                        </nav>
                    </div>

                    <div class="main-content">
                        <div class="topbar">
                            <div class="topbar-left">
                                <button class="toggle-sidebar" @click="sidebarOpen = !sidebarOpen">☰</button>
                                <div class="breadcrumb">
                                    <span>首页</span>
                                    <span>/</span>
                                    <span>{{ currentPageTitle }}</span>
                                </div>
                            </div>
                            <div class="topbar-right">
                                <div style="display: flex; align-items: center; gap: 15px;">
                                    <button class="btn btn-text" style="position: relative; font-size: 12px;" @click="goToNotifications">
                                        通知
                                        <span v-if="unreadNotificationCount > 0" style="position: absolute; top: -6px; right: -10px; min-width: 18px; height: 18px; border-radius: 999px; background: var(--accent); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; padding: 0 5px;">
                                            {{ unreadNotificationCount }}
                                        </span>
                                    </button>
                                    <button v-if="showApprovalBadge" class="btn btn-text" style="position: relative; font-size: 12px;" @click="goToApprovals">
                                        审批
                                        <span v-if="pendingApprovalCount > 0" style="position: absolute; top: -6px; right: -10px; min-width: 18px; height: 18px; border-radius: 999px; background: var(--warning); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; padding: 0 5px;">
                                            {{ pendingApprovalCount }}
                                        </span>
                                    </button>
                                    <div style="display: flex; align-items: center; gap: 5px; font-size: 12px;">
                                        <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--success);" :style="{ background: supabaseStatus.color }"></span>
                                        <span style="color: var(--text-secondary);">{{ supabaseStatus.text }}</span>
                                    </div>
                                    <div class="user-profile">
                                        <div class="avatar">{{ currentUserNameShort }}</div>
                                        <span>{{ currentUserName }}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="content">
                            <router-view></router-view>
                        </div>
                    </div>
                </div>
            `,
            setup() {
                const router = useRouter();
                const route = useRoute();
                const sidebarOpen = ref(false);

                const currentUserName = computed(() => userProfile.value?.name || '用户');
                const currentUserNameShort = computed(() => userProfile.value?.name?.charAt(0) || 'U');
                const userRole = computed(() => userProfile.value?.role || 'trainee');
                const unreadNotificationCount = ref(0);
                const pendingApprovalCount = ref(0);
                let topbarRefreshTimer = null;
                const supabaseStatus = computed(() => {
                    if (!isSupabaseConfigured.value) {
                        return { color: 'var(--danger)', text: '未配置' };
                    }
                    return { color: 'var(--success)', text: '已连接' };
                });
                const showApprovalBadge = computed(() => ['admin', 'mentor'].includes(userRole.value));

                const allRoutes = [
                    { path: '/dashboard', label: '仪表盘', roles: ['admin', 'mentor', 'trainee'] },
                    { path: '/courses', label: '培训中心', roles: ['admin', 'mentor', 'trainee'] },
                    { path: '/exam', label: '在线考试', roles: ['admin', 'trainee'] },
                    { path: '/tasks', label: '实操任务', roles: ['admin', 'mentor', 'trainee'] },
                    { path: '/workflow', label: '人才筛选', roles: ['admin', 'mentor'] },
                    { path: '/courseware', label: '课件版本', roles: ['admin', 'mentor', 'trainee'] },
                    { path: '/mentor', label: '带教跟踪', roles: ['admin', 'mentor'] },
                    { path: '/kpi', label: 'KPI考核', roles: ['admin', 'mentor', 'trainee'] },
                    { path: '/evaluation', label: '转正评估', roles: ['admin', 'mentor'] },
                    { path: '/archive', label: '历史归档', roles: ['admin', 'mentor'] },
                    { path: '/pilot', label: '试运行', roles: ['admin'] },
                    { path: '/resources', label: '资源中心', roles: ['admin', 'mentor', 'trainee'] },
                    { path: '/notifications', label: '通知中心', roles: ['admin', 'mentor', 'trainee'] },
                    { path: '/approvals', label: '审批中心', roles: ['admin', 'mentor'] },
                    { path: '/system-health', label: '系统诊断', roles: ['admin'] },
                    { path: '/analytics', label: '数据分析', roles: ['admin'] }
                ];

                const visibleRoutes = computed(() => {
                    return allRoutes.filter(r => r.roles.includes(userRole.value));
                });

                const pageRoutes = {
                    '/dashboard': '仪表盘',
                    '/courses': '培训中心',
                    '/exam': '在线考试',
                    '/tasks': '实操任务',
                    '/workflow': '人才筛选',
                    '/courseware': '课件版本',
                    '/mentor': '带教跟踪',
                    '/kpi': 'KPI考核',
                    '/evaluation': '转正评估',
                    '/archive': '历史归档',
                    '/pilot': '试运行',
                    '/resources': '资源中心',
                    '/notifications': '通知中心',
                    '/approvals': '审批中心',
                    '/system-health': '系统诊断',
                    '/analytics': '数据分析'
                };

                const currentPageTitle = computed(() => {
                    return pageRoutes[route.path] || '系统';
                });
                const loadTopbarCounts = async () => {
                    if (!isSupabaseConfigured.value || !userProfile.value) {
                        unreadNotificationCount.value = 0;
                        pendingApprovalCount.value = 0;
                        return;
                    }
                    try {
                        unreadNotificationCount.value = await DatabaseService.count(supabase, 'notifications', {
                            filters: [
                                { type: 'eq', column: 'user_id', value: userProfile.value.id },
                                { type: 'eq', column: 'read', value: false }
                            ]
                        });
                        if (showApprovalBadge.value) {
                            pendingApprovalCount.value = await DatabaseService.count(supabase, 'approval_logs', {
                                filters: [
                                    { type: 'eq', column: 'module', value: 'evaluation' }
                                ]
                            });
                        } else {
                            pendingApprovalCount.value = 0;
                        }
                    } catch (error) {
                        console.error('Topbar count load error:', error);
                    }
                };
                const refreshTopbarCountsOnFocus = () => {
                    loadTopbarCounts();
                };
                const refreshTopbarCountsOnVisible = () => {
                    if (document.visibilityState === 'visible') {
                        loadTopbarCounts();
                    }
                };
                const refreshTopbarCountsOnDataUpdate = () => {
                    loadTopbarCounts();
                };
                const goToNotifications = () => {
                    router.push('/notifications');
                };
                const goToApprovals = () => {
                    router.push('/approvals');
                };

                const handleLogout = async () => {
                    await AuthService.logout(supabase);
                    currentUser.value = null;
                    userProfile.value = null;
                    router.push('/');
                };

                watch(
                    () => [isSupabaseConfigured.value, userProfile.value?.id, route.path],
                    loadTopbarCounts,
                    { immediate: true }
                );
                onMounted(() => {
                    topbarRefreshTimer = setInterval(loadTopbarCounts, 30000);
                    window.addEventListener('focus', refreshTopbarCountsOnFocus);
                    window.addEventListener('app-data-refresh', refreshTopbarCountsOnDataUpdate);
                    document.addEventListener('visibilitychange', refreshTopbarCountsOnVisible);
                });
                onUnmounted(() => {
                    if (topbarRefreshTimer) clearInterval(topbarRefreshTimer);
                    window.removeEventListener('focus', refreshTopbarCountsOnFocus);
                    window.removeEventListener('app-data-refresh', refreshTopbarCountsOnDataUpdate);
                    document.removeEventListener('visibilitychange', refreshTopbarCountsOnVisible);
                });

                return {
                    sidebarOpen,
                    currentUserName,
                    currentUserNameShort,
                    visibleRoutes,
                    currentPageTitle,
                    handleLogout,
                    supabaseStatus,
                    unreadNotificationCount,
                    pendingApprovalCount,
                    showApprovalBadge,
                    goToNotifications,
                    goToApprovals
                };
            }
        };

        // ==================== Router Configuration ====================
        const routeRoleMap = {
            '/dashboard': ['admin', 'mentor', 'trainee'],
            '/courses': ['admin', 'mentor', 'trainee'],
            '/courses/:id': ['admin', 'mentor', 'trainee'],
            '/exam': ['admin', 'trainee'],
            '/tasks': ['admin', 'mentor', 'trainee'],
            '/tasks/:id': ['admin', 'mentor', 'trainee'],
            '/workflow': ['admin', 'mentor'],
            '/courseware': ['admin', 'mentor', 'trainee'],
            '/mentor': ['admin', 'mentor'],
            '/kpi': ['admin', 'mentor', 'trainee'],
            '/evaluation': ['admin', 'mentor'],
            '/archive': ['admin', 'mentor'],
            '/pilot': ['admin'],
            '/resources': ['admin', 'mentor', 'trainee'],
            '/notifications': ['admin', 'mentor', 'trainee'],
            '/approvals': ['admin', 'mentor'],
            '/system-health': ['admin'],
            '/analytics': ['admin']
        };
        const routes = [
            {
                path: '/',
                component: LoginView,
                meta: { requiresAuth: false }
            },
            {
                path: '/dashboard',
                component: DashboardView,
                meta: { requiresAuth: true, roles: routeRoleMap['/dashboard'] }
            },
            {
                path: '/courses',
                component: CoursesView,
                meta: { requiresAuth: true, roles: routeRoleMap['/courses'] }
            },
            {
                path: '/courses/:id',
                component: CourseDetailView,
                meta: { requiresAuth: true, roles: routeRoleMap['/courses/:id'] }
            },
            {
                path: '/exam',
                component: ExamView,
                meta: { requiresAuth: true, roles: routeRoleMap['/exam'] }
            },
            {
                path: '/tasks',
                component: TasksView,
                meta: { requiresAuth: true, roles: routeRoleMap['/tasks'] }
            },
            {
                path: '/tasks/:id',
                component: TaskDetailView,
                meta: { requiresAuth: true, roles: routeRoleMap['/tasks/:id'] }
            },
            {
                path: '/workflow',
                component: TalentWorkflowView,
                meta: { requiresAuth: true, roles: routeRoleMap['/workflow'] }
            },
            {
                path: '/courseware',
                component: CoursewareView,
                meta: { requiresAuth: true, roles: routeRoleMap['/courseware'] }
            },
            {
                path: '/mentor',
                component: MentorView,
                meta: { requiresAuth: true, roles: routeRoleMap['/mentor'] }
            },
            {
                path: '/kpi',
                component: KPIView,
                meta: { requiresAuth: true, roles: routeRoleMap['/kpi'] }
            },
            {
                path: '/evaluation',
                component: EvaluationView,
                meta: { requiresAuth: true, roles: routeRoleMap['/evaluation'] }
            },
            {
                path: '/archive',
                component: ArchiveView,
                meta: { requiresAuth: true, roles: routeRoleMap['/archive'] }
            },
            {
                path: '/pilot',
                component: PilotRunView,
                meta: { requiresAuth: true, roles: routeRoleMap['/pilot'] }
            },
            {
                path: '/resources',
                component: ResourcesView,
                meta: { requiresAuth: true, roles: routeRoleMap['/resources'] }
            },
            {
                path: '/notifications',
                component: NotificationsView,
                meta: { requiresAuth: true, roles: routeRoleMap['/notifications'] }
            },
            {
                path: '/approvals',
                component: ApprovalCenterView,
                meta: { requiresAuth: true, roles: routeRoleMap['/approvals'] }
            },
            {
                path: '/system-health',
                component: SystemHealthView,
                meta: { requiresAuth: true, roles: routeRoleMap['/system-health'] }
            },
            {
                path: '/analytics',
                component: AnalyticsView,
                meta: { requiresAuth: true, roles: routeRoleMap['/analytics'] }
            }
        ];

        const router = createRouter({
            history: createWebHashHistory(),
            routes
        });

        // Router guards
        router.beforeEach(async (to, from, next) => {
            if (!authInitialized.value) {
                await initAuth();
            }
            const isAuthenticated = !!currentUser.value;
            const currentRole = userProfile.value?.role || 'trainee';
            const allowedRoles = Array.isArray(to.meta.roles) ? to.meta.roles : null;
            if (to.meta.requiresAuth && !isAuthenticated) {
                next('/');
            } else if (to.path === '/' && isAuthenticated) {
                next('/dashboard');
            } else if (to.meta.requiresAuth && allowedRoles && !allowedRoles.includes(currentRole)) {
                next('/dashboard');
            } else {
                next();
            }
        });

        // ==================== App Setup ====================
        const app = createApp({
            template: `
                <div v-if="!authInitialized" class="app-loading">
                    <div class="app-loading-card">
                        <div class="app-loading-spinner"></div>
                        <div style="font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 8px;">系统初始化中</div>
                        <div style="font-size: 13px; color: var(--text-secondary); line-height: 1.7;">正在恢复登录状态与系统配置，请稍候片刻。</div>
                    </div>
                </div>
                <deployment-setup-view v-else-if="!isSupabaseConfigured" />
                <app-layout v-else />
            `,
            components: {
                'app-layout': AppLayout,
                'deployment-setup-view': DeploymentSetupView
            },
            setup() {
                onMounted(async () => {
                    // 初始化认证
                    await initAuth();

                    // 检查用户是否已登录
                    if (currentUser.value && router.currentRoute.value.path === '/') {
                        router.push('/dashboard');
                    }
                });

                return {
                    authInitialized,
                    isSupabaseConfigured
                };
            }
        });

        app.use(router);
        app.mount('#app');
    </script>
</body>
</html>
